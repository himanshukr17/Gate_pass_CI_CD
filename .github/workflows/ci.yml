name: React CI
 
on:
 
  push:
 
    branches:
 
      - development
 
      - main
 
jobs:
 
  build:
 
    runs-on: ubuntu-latest

    env:
 
      CI: false
 
    steps:
 
      - uses: actions/checkout@v4
 
      - uses: actions/setup-node@v4
 
        with:
 
          node-version: 20
 
          cache: yarn
 
      - run: yarn install --frozen-lockfile


 
      - run: yarn build
 
      - name: Upload Build
 
        uses: actions/upload-artifact@v4
 
        with:
 
          name: react-build
 
          path: build
 